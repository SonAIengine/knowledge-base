server {
    listen 3000;
    root /kb;
    index index.html;

    # SPA fallback for docsify
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Binary file downloads - force close connection
    location ~* \.(docx|xlsx|pptx|pdf|zip|hwp|jmx|doc|xls|ppt)$ {
        add_header Content-Disposition "attachment";
        add_header Connection "close";
        keepalive_timeout 0;
    }

    # Images
    location ~* \.(png|jpg|jpeg|gif|svg|ico)$ {
        expires 7d;
        keepalive_timeout 0;
    }
}
